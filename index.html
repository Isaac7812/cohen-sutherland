<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cohen-Sutherland</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #f4f4f4;
    }
    canvas {
      background: white;
      border: 1px solid #aaa;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>Cohen-Sutherland</h2>
  <canvas id="canvas" width="280" height="280"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.strokeStyle = "#0F6E56";
    ctx.lineWidth = 2;
    ctx.strokeRect(60, 60, 140, 140);
    ctx.fillStyle = "#0F6E56";
    ctx.font = "11px sans-serif";
    ctx.fillText("viewport", 63, 55);
  </script>
</body>
</html>
